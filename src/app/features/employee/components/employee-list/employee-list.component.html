<div class="page-wrapper">
  <header class="top-header">
    <div class="header-text">
      <h1>Employees</h1>
      <p>Manage company employees</p>
    </div>

    <div style="display: flex; gap: 16px;">
      <button class="btn-add" routerLink="/employees/new">+ Add employee</button>

      <button class="btn-add" style="background-color: transparent; border: 1px solid white;" (click)="onLogout()">
        Logout
      </button>
    </div>
  </header>

  <div class="main-content">
    <div class="filter-bar">
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" placeholder="Search employees..." class="search-input" (input)="onSearchInput($event)">
      </div>

      <div class="dropdown-wrapper">
        <span class="dropdown-label">Status</span>
        <select class="custom-select" (change)="onStatusChange($event)">
          <option value="All">All</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <table class="figma-table">
        <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Department</th>
          <th>Role</th>
          <th></th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let emp of filteredEmployees; trackBy: trackById">
          <td class="fw-bold">{{ emp.ime }} {{ emp.prezime }}</td>
          <td class="email-text">{{ emp.email }}</td>
          <td>{{ emp.departman || '-' }}</td>
          <td>{{ emp.role }}</td>
          <td class="action-cell">
            <button class="btn-edit" (click)="editEmployee(emp.id)">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
            <button class="btn-delete" (click)="deleteEmployee(emp.id)">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
              </svg>
            </button>
          </td>
        </tr>
        </tbody>
      </table>

    </div>
  </div>
</div>

<app-employee-edit-modal
  *ngIf="isEditModalOpen && selectedEmployeeForEdit"
  [employee]="selectedEmployeeForEdit"
  (save)="onEmployeeSaved($event)"
  (cancel)="closeEditModal()">
</app-employee-edit-modal>
