<div class="page-wrapper">
  <div class="form-card">
    <h1 class="form-title">Add employee</h1>

    <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        
        <div class="form-group">
          <label>First Name <span class="required">*</span></label>
          <input type="text" formControlName="firstName" placeholder="Enter first name"
                 [class.input-error]="employeeForm.get('firstName')?.invalid && employeeForm.get('firstName')?.touched">
          <span class="error-msg" *ngIf="employeeForm.get('firstName')?.invalid && employeeForm.get('firstName')?.touched">
            Ime je obavezno.
          </span>
        </div>

        <div class="form-group">
          <label>Last Name <span class="required">*</span></label>
          <input type="text" formControlName="lastName" placeholder="Enter last name"
                 [class.input-error]="employeeForm.get('lastName')?.invalid && employeeForm.get('lastName')?.touched">
          <span class="error-msg" *ngIf="employeeForm.get('lastName')?.invalid && employeeForm.get('lastName')?.touched">
            Prezime je obavezno.
          </span>
        </div>

        <div class="form-group">
          <label>Phone number <span class="required">*</span></label>
          <input type="text" formControlName="phoneNumber" placeholder="Enter phone number"
                 [class.input-error]="employeeForm.get('phoneNumber')?.invalid && employeeForm.get('phoneNumber')?.touched">
        </div>

        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" formControlName="email" placeholder="Enter email"
                 [class.input-error]="employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched">
        </div>

        <div class="form-group">
          <label>Birth date <span class="required">*</span></label>
          <input type="date" formControlName="birthDate"
                 [class.input-error]="employeeForm.get('birthDate')?.invalid && employeeForm.get('birthDate')?.touched">
        </div>

        <div class="form-group">
          <label>Gender <span class="required">*</span></label>
          <select formControlName="gender" class="custom-select"
                  [class.input-error]="employeeForm.get('gender')?.invalid && employeeForm.get('gender')?.touched">
            <option value="" disabled selected>Select gender</option>
            <option value="M">Male</option>
            <option value="Z">Female</option>
          </select>
        </div>

        <div class="form-group">
          <label>Role <span class="required">*</span></label>
          <select formControlName="role" class="custom-select"
                  [class.input-error]="employeeForm.get('role')?.invalid && employeeForm.get('role')?.touched">
            <option value="" disabled selected>Select role</option>
            <option value="ADMIN">Admin</option>
            <option value="BASIC">Basic</option>
          </select>
        </div>

        <div class="form-group">
          <label>Department <span class="required">*</span></label>
          <input type="text" formControlName="department" placeholder="Enter department"
                 [class.input-error]="employeeForm.get('department')?.invalid && employeeForm.get('department')?.touched">
        </div>

        <div class="form-group">
          <label>Position <span class="required">*</span></label>
          <input type="text" formControlName="position" placeholder="Enter position"
                 [class.input-error]="employeeForm.get('position')?.invalid && employeeForm.get('position')?.touched">
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" routerLink="/employees">Cancel</button>
        <button type="submit" class="btn-save" [disabled]="employeeForm.invalid">Save</button>
      </div>
    </form>
  </div>
</div>
